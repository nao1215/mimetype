name = "mimetype"
version = "0.5.0"
description = "MIME type lookup and magic-number detection for Gleam on Erlang and JavaScript targets"
licences = ["MIT"]
repository = { type = "github", user = "nao1215", repo = "mimetype" }
links = [
  { title = "Hex", href = "https://hex.pm/packages/mimetype" },
  { title = "Documentation", href = "https://hexdocs.pm/mimetype" },
  { title = "Repository", href = "https://github.com/nao1215/mimetype" },
  { title = "Changelog", href = "https://github.com/nao1215/mimetype/blob/main/CHANGELOG.md" },
]
internal_modules = [
  "mimetype/internal",
  "mimetype/internal/*",
]
gleam = ">= 1.15.0"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
glinter = ">= 2.14.0 and < 3.0.0"

[tools.glinter]
warnings_as_errors = true
include = ["src/", "test/"]

[tools.glinter.rules]
label_possible = "off"
unused_exports = "off"

[tools.glinter.ignore]
"test/**/*.gleam" = [
  "assert_ok_pattern",
  "missing_type_annotation",
  "unused_exports",
]
